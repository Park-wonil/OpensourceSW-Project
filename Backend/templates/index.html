<html lang="ko">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

  <div class="app-container">

          <div class="stats-box" style="margin-bottom:0;">

            <div id="current-absence-row" class="detail-row" style="display: none;">

            </button>

    <div id="section-stats" class="panel extra-section">
      <h2 class="section-title">📊 상세 통계</h2>

          <p class="stats-highlight">02:45:12</p>
        </div>
        <div class="stats-item">
          <p class="stats-title">평균 집중 점수</p>
          <p class="stats-highlight" style="color: var(--text-main);">92점</p>
        </div>
      </div>
    </div>

    <div id="section-settings" class="panel extra-section">
      <h2 class="section-title">⚙️ 환경 설정</h2>
      <div class="detail-row"><span>졸음 알림 소리</span> <b>ON</b></div>
      <div class="detail-row"><span>이탈 경고 문구 표시</span> <b>ON</b></div>
      <div class="detail-row"><span>데이터 초기화</span> <b class="text-danger">RESET</b></div>
    </div>

  </div>

  <script>
    /** * [Global Variables] 
     * localScore: 브라우저에서 계산하는 실시간 집중도 (0~100)
     * monitoring: setInterval 객체 저장용
     * lastAbsence...: 카메라가 꺼져도 UI에 유지할 마지막 수치 데이터
     */
    let localScore = 100;
    let monitoring = null;
    let seconds = 1500;
    let running = false;
    let timerInterval = null;
    let lastAbsenceCount = 0;
    let lastTotalAbsenceS = 0;

    /**
     * [UI Control] 섹션 이동 함수
     * @param {string} id - 이동할 섹션의 ID
     * @param {HTMLElement} btn - 클릭된 버튼 객체
     */
    function showSection(id, btn) {
      const section = document.getElementById('section-' + id);
      section.scrollIntoView({ behavior: 'smooth' });

      // 버튼 활성화 스타일 업데이트
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
    }

    /**
     * [Camera Control] 카메라 시작 및 모니터링 루프 가동
     */
    function startCamera() {
      fetch('/start').then(() => {
        const videoTag = document.getElementById("video");
        videoTag.style.display = "block";
        videoTag.src = "/video"; 
        document.getElementById("cam-placeholder").style.display = "none";
        
        const statusTag = document.getElementById("cam-status");
        statusTag.innerText = "LIVE";
        statusTag.style.color = "var(--accent-green)";
        
        // 1초마다 백엔드에서 데이터를 가져오는 루프 실행
        if (monitoring) clearInterval(monitoring);
        monitoring = setInterval(checkAll, 1000);
      });
    }

    /**
     * [Camera Control] 카메라 중지 및 모니터링 루프 해제
     */
    function stopCamera() {
      fetch('/stop').then(() => {
        const videoTag = document.getElementById("video");
        videoTag.src = "";
        videoTag.style.display = "none";
        document.getElementById("cam-placeholder").style.display = "flex";
        
        const statusTag = document.getElementById("cam-status");
        statusTag.innerText = "OFF";
        statusTag.style.color = "var(--text-sub)";
        
        // 데이터 통신은 멈추지만 기존 UI 값은 유지됨
        if (monitoring) clearInterval(monitoring);
      });
    }

    /**
     * [Data Core] 백엔드 데이터 동기화 및 점수 계산 로직
     */
    function checkAll() {
      fetch('/detect').then(res => res.json()).then(data => {
        // 1. 데이터 유효성 검사 및 캐싱 (undefined 방지)
        if (data.absence_count !== undefined) {
          lastAbsenceCount = data.absence_count;
          lastTotalAbsenceS = data.total_absence_s;
        }

        // 2. 상단 상태 UI 업데이트
        document.getElementById("face-detected").innerText = data.face_detected ? "O" : "X";
        document.getElementById("cam-ear").innerText = `| EAR: ${data.ear ? data.ear.toFixed(3) : '0.000'}`;
        document.getElementById("absence-stats").innerText = `${lastAbsenceCount}회 (누적 ${lastTotalAbsenceS}초)`;

        // 3. 집중 점수 계산 (브라우저 자체 가중치 적용)
        if (data.is_absent || data.state === "absent") localScore -= 2.0;    // 자리비움 시 감점
        else if (data.state === "sleepy") localScore -= 1.0;                // 졸음 시 감점
        else if (data.state === "focused") localScore += 0.3;               // 집중 시 회복

        localScore = Math.max(0, Math.min(100, localScore));                // 0~100 범위 고정
        updateScoreUI(Math.floor(localScore));

        // 4. 집중 상태 뱃지 업데이트
        const badge = document.getElementById("state-badge");
        const row = document.getElementById("current-absence-row");
        
        if (data.is_absent) {
          badge.className = "state-badge away";
          badge.innerHTML = "<span></span> 자리 비움";
          row.style.display = "flex";
          document.getElementById("current-absence-time").innerText = `${data.current_absence_s}초`;
        } else if (data.state === "sleepy") {
          badge.className = "state-badge drowsy";
          badge.innerHTML = "<span></span> 졸음 감지";
          row.style.display = "none";
        } else {
          badge.className = "state-badge studying";
          badge.innerHTML = "<span></span> 집중 중";
          row.style.display = "none";
        }
      }).catch(err => console.log("서버 응답 대기 중..."));
    }

    /**
     * [UI Update] 점수에 따른 게이지 색상 및 텍스트 변경
     */
    function updateScoreUI(score) {
      const txt = document.getElementById("score-text");
      const bar = document.getElementById("score-bar");
      txt.innerText = score + "점";
      bar.style.width = score + "%";

      if (score >= 80) { 
        txt.style.color = "var(--accent-green)"; 
        bar.style.background = "var(--accent-green)"; 
      } else if (score >= 50) { 
        txt.style.color = "var(--accent-orange)"; 
        bar.style.background = "var(--accent-orange)"; 
      } else { 
        txt.style.color = "var(--accent-red)"; 
        bar.style.background = "var(--accent-red)"; 
      }
    }

    /**
     * [Timer Logic] 뽀모도로 타이머 제어
     */
    function toggleTimer() {
      running = !running;
      const icon = document.getElementById('timer-icon');
      if (running) {
        icon.className = "pause-icon";
        icon.innerHTML = '<div class="pause-bar"></div><div class="pause-bar"></div>';
        timerInterval = setInterval(() => {
          if (seconds > 0) { seconds--; updateTimerDisplay(); }
        }, 1000);
      } else {
        clearInterval(timerInterval);
        icon.className = "play-icon";
        icon.innerHTML = "";
      }
    }

    function resetTimer() {
      clearInterval(timerInterval);
      running = false;
      seconds = 1500;
      updateTimerDisplay();
      const icon = document.getElementById('timer-icon');
      icon.className = "play-icon";
      icon.innerHTML = "";
    }

    function updateTimerDisplay() {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      document.getElementById('timer-display').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
  </script>
